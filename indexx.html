<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>环球知识大富翁 3D - 星环版</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --p1: #ff4757; --p2: #2ed573; --p3: #1e90ff; --p4: #ffa502;
  --gold: #ffd700; --dark: #0f0f23; --panel: rgba(20,20,40,0.95);
}
body {
  font-family: 'Microsoft YaHei', sans-serif;
  background: linear-gradient(135deg, #0c0c1d 0%, #1a1a3e 50%, #16213e 100%);
  color: #fff; height: 100vh; overflow: hidden;
}

/* ===== SCREENS ===== */
.screen { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity .6s; }
.screen.hidden { opacity: 0; pointer-events: none; }
#startScreen { background: radial-gradient(ellipse at center, #1e1e4f 0%, #0a0a1a 100%); z-index: 100; }
#gameScreen { z-index: 10; opacity: 0; }
#gameScreen:not(.hidden) { opacity: 1; }
#gameOverScreen { background: rgba(0,0,0,.92); z-index: 200; }

/* ===== START UI ===== */
.game-title { font-size: 52px; font-weight: 900; margin-bottom: 8px; background: linear-gradient(90deg,#ffd700,#ff6b6b,#c44569); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-shadow: 0 0 40px rgba(255,215,0,.3); letter-spacing: 2px; }
.game-subtitle { font-size: 18px; opacity: .7; margin-bottom: 30px; }
.map-selection { display: flex; gap: 25px; margin-bottom: 25px; }
.map-card { width: 260px; padding: 25px; background: rgba(255,255,255,.08); border: 2px solid rgba(255,255,255,.15); border-radius: 20px; cursor: pointer; text-align: center; transition: all .3s; backdrop-filter: blur(10px); }
.map-card:hover, .map-card.selected { border-color: var(--gold); background: rgba(255,215,0,.12); transform: translateY(-5px); box-shadow: 0 15px 40px rgba(255,215,0,.2); }
.map-card .map-icon { font-size: 50px; margin-bottom: 10px; }
.map-card h3 { font-size: 22px; margin-bottom: 6px; }
.map-card p { font-size: 13px; opacity: .8; line-height: 1.5; }
.player-count { display: flex; gap: 12px; margin-bottom: 20px; }
.count-btn { width: 45px; height: 45px; border-radius: 50%; border: 2px solid rgba(255,255,255,.3); background: rgba(255,255,255,.1); color: #fff; font-size: 18px; font-weight: bold; cursor: pointer; transition: all .3s; }
.count-btn:hover, .count-btn.selected { background: var(--gold); color: #222; border-color: var(--gold); transform: scale(1.15); }
.char-selection { display: flex; gap: 12px; margin-bottom: 15px; flex-wrap: wrap; justify-content: center; max-width: 700px; }
.char-card { width: 70px; height: 85px; border-radius: 14px; background: rgba(255,255,255,.08); border: 2px solid transparent; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: all .3s; font-size: 28px; }
.char-card:hover, .char-card.selected { border-color: var(--gold); background: rgba(255,215,0,.15); transform: scale(1.1); }
.char-card.assigned { opacity: .35; cursor: not-allowed; border-color: transparent; }
.char-card .char-name { font-size: 11px; margin-top: 4px; }
#selectedChars { margin-bottom: 18px; font-size: 15px; min-height: 24px; color: var(--gold); }
.start-btn { padding: 16px 55px; font-size: 20px; font-weight: bold; background: linear-gradient(135deg,#ff6b6b,#ee5a24); color: #fff; border: none; border-radius: 50px; cursor: pointer; box-shadow: 0 6px 25px rgba(238,90,36,.4); transition: all .3s; }
.start-btn:hover { transform: translateY(-3px); box-shadow: 0 10px 35px rgba(238,90,36,.6); }
.menu-btns { display: flex; gap: 15px; margin-top: 20px; }
.save-btn { padding: 10px 22px; background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.25); color: #fff; border-radius: 10px; cursor: pointer; transition: all .3s; font-size: 14px; backdrop-filter: blur(10px); }
.save-btn:hover { background: rgba(255,255,255,.25); transform: translateY(-2px); }

/* ===== GAME BOARD - 3D HORIZONTAL RING (ENLARGED & TILTED) ===== */
.scene-3d { 
  perspective: 1400px; 
  width: 100vw; 
  height: 100vh; 
  display: flex; 
  align-items: center; 
  justify-content: center; 
  position: relative; 
  overflow: hidden;
  cursor: grab;
}
.scene-3d:active {
  cursor: grabbing;
}
.world-3d { 
  transform-style: preserve-3d; 
  position: relative; 
  width: 900px; 
  height: 900px; 
  transition: transform 1.2s ease;
  transform: rotateX(18deg) rotateY(0deg) rotateZ(2deg);
}

/* Board Ring - horizontal like Saturn ring, LARGER */
.board-ring {
  position: absolute;
  width: 800px;
  height: 800px;
  left: 50px;
  top: 50px;
  transform-style: preserve-3d;
  transform: rotateX(75deg);
  background: radial-gradient(circle, rgba(30,30,60,.6) 0%, rgba(20,20,50,.7) 50%, rgba(15,15,40,.8) 100%);
  border-radius: 50%;
  box-shadow: inset 0 0 100px rgba(0,0,0,.5), 0 0 0 1px rgba(255,255,255,.1);
}

/* Decorative ring layers */
.ring-glow {
  position: absolute;
  width: 860px;
  height: 860px;
  left: 20px;
  top: 20px;
  transform: rotateX(75deg) rotateY(180deg);
  border-radius: 50%;
  border: 4px solid rgba(255,215,0,.2);
  box-shadow: 0 0 60px rgba(255,215,0,.15), inset 0 0 60px rgba(255,215,0,.08);
  pointer-events: none;
}

.ring-inner {
  position: absolute;
  width: 560px;
  height: 560px;
  left: 170px;
  top: 170px;
  transform: rotateX(75deg) rotateY(180deg);
  border-radius: 50%;
  border: 2px solid rgba(255,255,255,.1);
  background: radial-gradient(circle, rgba(50,40,100,.5) 0%, transparent 70%);
  pointer-events: none;
}

/* ===== CELLS - Horizontal Ring Layout ===== */
.cell {
  position: absolute;
  width: 85px;
  height: 85px;
  transform-style: preserve-3d;
  cursor: pointer;
  transition: all .35s cubic-bezier(.34,1.56,.64,1);
  z-index: 20;
}
.cell:hover {
  transform: translateZ(30px) scale(1.15);
  z-index: 50;
}
.cell-face {
  position: absolute;
  width: 100%;
  height: 100%;
  backface-visibility: hidden;
  border-radius: 14px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  text-align: center;
  padding: 5px;
  box-shadow: 0 6px 20px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.2);
  border: 2px solid rgba(255,255,255,.25);
}
.cell-front {
  background: linear-gradient(135deg, rgba(52, 152, 219, 1), rgba(41, 128, 185, 1));
  transform: translateZ(18px);
}
.cell-back {
  background: linear-gradient(135deg, rgba(44, 62, 80, .95), rgba(52, 73, 94, .95));
  transform: rotateY(180deg) translateZ(18px);
}
.cell-top {
  background: rgba(255,255,255,.12);
  transform: rotateX(90deg) translateZ(42.5px);
  height: 36px;
  border-radius: 14px;
}
.cell-right {
  background: rgba(255,255,255,.06);
  transform: rotateY(90deg) translateZ(42.5px);
  width: 36px;
  left: 24.5px;
  border-radius: 4px;
}
.cell-left {
  background: rgba(255,255,255,.06);
  transform: rotateY(-90deg) translateZ(42.5px);
  width: 36px;
  left: 24.5px;
  border-radius: 4px;
}
.cell-bottom {
  background: rgba(0,0,0,.35);
  transform: rotateX(-90deg) translateZ(42.5px);
  height: 36px;
  border-radius: 14px;
}

/* Cell type colors */
.cell.start .cell-front {
  background: linear-gradient(135deg, rgba(46, 204, 113, 1), rgba(39, 174, 96, 1));
  border-color: rgba(46, 204, 113, .6);
  box-shadow: 0 0 20px rgba(46, 204, 113, .5);
}
.cell.chance .cell-front {
  background: linear-gradient(135deg, rgba(155, 89, 182, 1), rgba(142, 68, 173, 1));
  border-color: rgba(155, 89, 182, .6);
  box-shadow: 0 0 20px rgba(155, 89, 182, .5);
}
.cell.special .cell-front {
  background: linear-gradient(135deg, rgba(231, 76, 60, .95), rgba(192, 57, 43, .95));
}

.cell-icon { font-size: 24px; margin-bottom: 3px; filter: drop-shadow(0 2px 4px rgba(0,0,0,.5)); }
.cell-name { font-weight: bold; font-size: 12px; line-height: 1.2; text-shadow: 0 1px 3px rgba(0,0,0,.8); }

/* Current cell highlight */
.cell.current-cell .cell-front {
  border-color: var(--gold);
  box-shadow: 0 0 25px rgba(255,215,0,.6), inset 0 0 25px rgba(255,215,0,.3);
  animation: cellPulse 2s infinite;
}
@keyframes cellPulse { 0%,100%{box-shadow:0 0 20px rgba(255,215,0,.5)} 50%{box-shadow:0 0 40px rgba(255,215,0,.8)} }

/* ===== CENTER HUB ===== */
.center-hub {
  position: absolute;
  width: 280px;
  height: 280px;
  left: 310px;
  top: 310px;
  transform: translateZ(100px) rotateX(75deg) rotateY(180deg);
  border-radius: 50%;
  background: radial-gradient(circle, rgba(50,50,100,.9) 0%, rgba(30,30,70,.95) 60%, rgba(20,20,50,1) 80%);
  border: 3px solid rgba(255,215,0,.4);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(15px);
  box-shadow: 0 0 60px rgba(255,215,0,.3), inset 0 0 50px rgba(255,215,0,.1), 0 0 0 8px rgba(255,215,0,.1);
}
.center-hub h2 { font-size: 56px; margin-bottom: 8px; filter: drop-shadow(0 4px 8px rgba(0,0,0,.5)); }
.center-hub p { font-size: 16px; opacity: .8; letter-spacing: 4px; }

/* ===== PLAYER TOKENS ===== */
.player-token {
  position: absolute;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  font-weight: bold;
  box-shadow: 0 6px 20px rgba(0,0,0,.5), inset 0 2px 6px rgba(255,255,255,.4);
  transition: all .6s cubic-bezier(.34,1.56,.64,1);
  z-index: 100;
  border: 3px solid white;
  transform: translateZ(35px);
  text-shadow: 0 1px 2px rgba(0,0,0,.5);
}
.player-token.p1 { background: linear-gradient(135deg, #ff4757, #c44569); }
.player-token.p2 { background: linear-gradient(135deg, #2ed573, #26af61); }
.player-token.p3 { background: linear-gradient(135deg, #1e90ff, #1c7ed6); }
.player-token.p4 { background: linear-gradient(135deg, #ffa502, #e67e22); }
.player-token.active {
  animation: tokenBounce 1.2s infinite;
  z-index: 110;
  box-shadow: 0 0 25px currentColor;
}
@keyframes tokenBounce { 0%,100%{transform:translateZ(35px) scale(1)} 50%{transform:translateZ(55px) scale(1.2)} }

/* ===== DICE ===== */
.dice-container { position: fixed; right: 30px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; align-items: center; gap: 20px; z-index: 300; }
.dice-3d { width: 90px; height: 90px; transform-style: preserve-3d; position: relative; }
.dice-face { position: absolute; width: 90px; height: 90px; background: linear-gradient(145deg, #fff, #e0e0e0); border: 2px solid #bbb; border-radius: 16px; display: grid; grid-template-columns: repeat(3,1fr); grid-template-rows: repeat(3,1fr); padding: 10px; box-shadow: inset 0 0 15px rgba(0,0,0,.1); }
.dot { width: 16px; height: 16px; background: #333; border-radius: 50%; align-self: center; justify-self: center; box-shadow: inset 0 1px 3px rgba(0,0,0,.5); }
.dice-face:nth-child(1){transform:translateZ(45px)} .dice-face:nth-child(2){transform:rotateY(180deg)translateZ(45px)}
.dice-face:nth-child(3){transform:rotateY(90deg)translateZ(45px)} .dice-face:nth-child(4){transform:rotateY(-90deg)translateZ(45px)}
.dice-face:nth-child(5){transform:rotateX(90deg)translateZ(45px)} .dice-face:nth-child(6){transform:rotateX(-90deg)translateZ(45px)}
.dice-3d.rolling { animation: diceRoll 1.2s ease-in-out; }
@keyframes diceRoll { 0%{transform:rotateX(0)rotateY(0)rotateZ(0)} 25%{transform:rotateX(720deg)rotateY(360deg)rotateZ(180deg)} 50%{transform:rotateX(1440deg)rotateY(720deg)rotateZ(360deg)} 75%{transform:rotateX(1800deg)rotateY(1080deg)rotateZ(540deg)} 100%{transform:rotateX(2160deg)rotateY(1440deg)rotateZ(720deg)} }
.roll-btn { padding: 16px 32px; font-size: 18px; font-weight: bold; background: linear-gradient(135deg,#ff6b6b,#ee5a24); color: #fff; border: none; border-radius: 50px; cursor: pointer; box-shadow: 0 4px 20px rgba(238,90,36,.4); transition: all .3s; }
.roll-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 6px 25px rgba(238,90,36,.6); }
.roll-btn:disabled { background: #555; cursor: not-allowed; box-shadow: none; opacity: .6; }

/* ===== PLAYER PANEL ===== */
.player-panel { position: fixed; left: 20px; top: 20px; display: flex; flex-direction: column; gap: 12px; z-index: 300; max-width: 230px; }
.player-card { background: rgba(20,20,40,.95); backdrop-filter: blur(12px); border-radius: 16px; padding: 14px 16px; border: 2px solid rgba(255,255,255,.1); transition: all .3s; position: relative; overflow: hidden; }
.player-card.active { border-color: var(--gold); box-shadow: 0 0 20px rgba(255,215,0,.25), inset 0 0 20px rgba(255,215,0,.05); background: rgba(30,30,50,.95); }
.player-card.skip-turn { opacity: .45; border-color: rgba(255,71,87,.5); }
.player-card.skip-turn::after { content:"⏸️ 暂停"; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); background:rgba(255,71,87,.9); padding:4px 10px; border-radius:6px; font-size:12px; font-weight:bold; }
.player-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.player-avatar { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; border: 2px solid rgba(255,255,255,.8); box-shadow: 0 2px 10px rgba(0,0,0,.3); }
.player-info h4 { font-size: 14px; margin-bottom: 2px; }
.player-stats { display: flex; gap: 12px; font-size: 13px; }
.stat-correct { color: #2ed573; font-weight: bold; }
.stat-wrong { color: #ff4757; font-weight: bold; }
.progress-bar { width: 100%; height: 6px; background: rgba(255,255,255,.15); border-radius: 3px; margin-top: 8px; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg,#2ed573,#26af61); border-radius: 3px; transition: width .5s ease; box-shadow: 0 0 10px rgba(46,213,115,.3); }

/* ===== TURN INDICATOR ===== */
.turn-indicator { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); padding: 12px 32px; background: rgba(20,20,40,.95); backdrop-filter: blur(12px); border-radius: 50px; border: 2px solid var(--gold); font-size: 18px; font-weight: bold; z-index: 300; display: flex; align-items: center; gap: 10px; box-shadow: 0 5px 25px rgba(0,0,0,.4); }
.turn-indicator .player-dot { width: 16px; height: 16px; border-radius: 50%; border: 2px solid #fff; box-shadow: 0 0 8px currentColor; }

/* ===== QUIZ MODAL ===== */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(5,5,15,.92);
  backdrop-filter: blur(15px);
  display: flex; align-items: center; justify-content: center;
  z-index: 9999;
  opacity: 0; pointer-events: none;
  transition: opacity .35s ease;
}
.modal-overlay.show { opacity: 1; pointer-events: all; }
.quiz-modal {
  width: 720px; max-width: 92vw;
  background: linear-gradient(145deg, #1e1e3f, #2d2d5a);
  border-radius: 24px; padding: 40px;
  border: 2px solid rgba(255,215,0,.3);
  box-shadow: 0 25px 70px rgba(0,0,0,.6), 0 0 40px rgba(255,215,0,.1);
  transform: scale(.92);
  transition: transform .35s ease;
  position: relative;
  z-index: 10000;
}
.modal-overlay.show .quiz-modal { transform: scale(1); }
.quiz-location { display: flex; align-items: center; gap: 14px; margin-bottom: 18px; padding-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,.15); }
.quiz-location-icon { font-size: 48px; filter: drop-shadow(0 2px 4px rgba(0,0,0,.3)); }
.quiz-location h3 { font-size: 24px; letter-spacing: 1px; }
.quiz-location p { font-size: 14px; opacity: .7; margin-top: 3px; }
.quiz-question { font-size: 20px; line-height: 1.7; margin-bottom: 22px; padding: 20px 24px; background: rgba(0,0,0,.35); border-radius: 14px; border-left: 4px solid var(--gold); box-shadow: inset 0 0 20px rgba(0,0,0,.2); }
.quiz-options { display: flex; flex-direction: column; gap: 10px; margin-bottom: 18px; position: relative; z-index: 10001; }
.option-btn {
  padding: 16px 20px; background: rgba(255,255,255,.08);
  border: 2px solid rgba(255,255,255,.18); border-radius: 12px;
  color: #fff; font-size: 17px; cursor: pointer;
  transition: all .25s ease; text-align: left;
  display: flex; align-items: center; gap: 14px;
  position: relative; z-index: 10001;
  user-select: none; -webkit-user-select: none;
}
.option-btn:hover:not(.disabled) { background: rgba(255,255,255,.18); border-color: #74b9ff; transform: translateX(6px); box-shadow: 0 4px 15px rgba(116,185,255,.15); }
.option-btn.correct { background: rgba(46,213,115,.25) !important; border-color: #2ed573 !important; box-shadow: 0 0 20px rgba(46,213,115,.2); }
.option-btn.wrong { background: rgba(255,71,87,.25) !important; border-color: #ff4757 !important; }
.option-btn.disabled { cursor: default; opacity: .65; pointer-events: none; }
.option-label { width: 36px; height: 36px; border-radius: 50%; background: rgba(255,255,255,.15); display: flex; align-items: center; justify-content: center; font-weight: bold; flex-shrink: 0; font-size: 16px; transition: all .3s; }
.option-btn:hover:not(.disabled) .option-label { background: rgba(116,185,255,.3); }
.option-btn.correct .option-label { background: rgba(46,213,115,.4) !important; }
.option-btn.wrong .option-label { background: rgba(255,71,87,.4) !important; }

.explanation { padding: 20px; background: rgba(116,185,255,.15); border-radius: 12px; border-left: 4px solid #74b9ff; margin-top: 12px; line-height: 1.7; display: none; font-size: 16px; }
.explanation.show { display: block; animation: fadeIn .5s ease; }
@keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
.modal-actions { display: flex; justify-content: flex-end; gap: 12px; margin-top: 18px; }
.action-btn { padding: 14px 32px; border-radius: 10px; border: none; font-size: 16px; font-weight: bold; cursor: pointer; transition: all .3s; z-index: 10001; position: relative; }
.action-btn.primary { background: linear-gradient(135deg,#74b9ff,#0984e3); color: #fff; box-shadow: 0 4px 15px rgba(116,185,255,.3); }
.action-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,.3); }
.action-btn:disabled { opacity: .5; cursor: not-allowed; transform: none; }

/* ===== GAME OVER ===== */
.winner-display { text-align: center; animation: winnerPop 1s ease; }
@keyframes winnerPop { 0%{transform:scale(0);opacity:0} 60%{transform:scale(1.08)} 100%{transform:scale(1);opacity:1} }
.winner-trophy { font-size: 120px; margin-bottom: 15px; filter: drop-shadow(0 4px 10px rgba(255,215,0,.4)); }
.winner-name { font-size: 38px; margin-bottom: 8px; color: var(--gold); text-shadow: 0 0 20px rgba(255,215,0,.3); }
.final-stats { display: flex; gap: 25px; margin: 25px 0; justify-content: center; flex-wrap: wrap; }
.final-stat { text-align: center; padding: 20px 30px; background: rgba(255,255,255,.1); border-radius: 16px; border: 1px solid rgba(255,255,255,.15); }
.final-stat-value { font-size: 38px; font-weight: bold; color: var(--gold); }
.final-stat-label { font-size: 14px; opacity: .8; margin-top: 5px; }

/* ===== LOG ===== */
.game-log { position: fixed; bottom: 20px; left: 20px; width: 320px; max-height: 200px; background: rgba(20,20,40,.95); backdrop-filter: blur(10px); border-radius: 12px; padding: 14px; overflow-y: auto; font-size: 13px; z-index: 300; border: 1px solid rgba(255,255,255,.1); }
.game-log::-webkit-scrollbar { width: 5px; }
.game-log::-webkit-scrollbar-thumb { background: rgba(255,255,255,.25); border-radius: 3px; }
.log-entry { padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,.08); opacity: .9; line-height: 1.4; }
.log-entry:last-child { border-bottom: none; }
.log-title { font-weight: bold; margin-bottom: 6px; border-bottom: 1px solid rgba(255,255,255,.15); padding-bottom: 5px; font-size: 14px; color: var(--gold); }

/* ===== SAVE PANEL ===== */
.save-panel { position: fixed; bottom: 20px; right: 20px; display: flex; gap: 10px; z-index: 300; }
.save-btn { padding: 12px 24px; background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.25); color: #fff; border-radius: 10px; cursor: pointer; transition: all .3s; font-size: 14px; backdrop-filter: blur(10px); }
.save-btn:hover { background: rgba(255,255,255,.25); transform: translateY(-2px); }

/* ===== CHINA THEME ===== */
body.theme-china { background: linear-gradient(135deg, #4a0e0e 0%, #8b0000 50%, #dc143c 100%); }
body.theme-china .cell-front { background: linear-gradient(135deg, rgba(200,50,50,1), rgba(120,20,20,1)) !important; border-color: rgba(255,200,100,.5) !important; }
body.theme-china .cell.chance .cell-front { background: linear-gradient(135deg, rgba(180,120,40,1), rgba(140,90,30,1)) !important; }
body.theme-china .game-title { background: linear-gradient(90deg,#ffd700,#ff6347,#dc143c); -webkit-background-clip: text; background-clip: text; }

/* ===== CONFETTI ===== */
.confetti { position: fixed; width: 10px; height: 10px; top: -10px; z-index: 9998; animation: confettiFall linear forwards; }
@keyframes confettiFall { to { transform: translateY(100vh) rotate(720deg); opacity: 0; } }

/* ===== FLOATING ===== */
.floating { animation: float 4s ease infinite; }
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }

/* ===== ANGLE CONTROL ===== */
.angle-control {
  position: fixed;
  right: 30px;
  top: calc(50% + 130px);
  display: flex;
  flex-direction: column;
  gap: 8px;
  z-index: 300;
  background: rgba(20,20,40,.85);
  backdrop-filter: blur(10px);
  padding: 12px;
  border-radius: 16px;
  border: 1px solid rgba(255,255,255,.15);
  box-shadow: 0 8px 32px rgba(0,0,0,.4);
  align-items: center;
}
.angle-control-title {
  font-size: 12px;
  text-align: center;
  opacity: .8;
  margin-bottom: 4px;
  letter-spacing: 1px;
  color: var(--gold);
}
.angle-btn {
  width: 44px;
  height: 44px;
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,.2);
  background: rgba(255,255,255,.1);
  color: #fff;
  font-size: 13px;
  cursor: pointer;
  transition: all .3s;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
}
.angle-btn:hover {
  background: rgba(255,255,255,.2);
  border-color: rgba(255,255,255,.4);
  transform: scale(1.1);
}
.angle-btn.active {
  background: rgba(255,215,0,.25);
  border-color: var(--gold);
  color: var(--gold);
  box-shadow: 0 0 12px rgba(255,215,0,.3);
}

/* ===== RESPONSIVE ===== */
@media (max-width: 1400px) {
  .world-3d { transform: rotateX(18deg) rotateY(0deg) rotateZ(2deg) scale(0.85) !important; }
}
@media (max-width: 1100px) {
  .world-3d { transform: rotateX(18deg) rotateY(0deg) rotateZ(2deg) scale(0.7) !important; }
  .player-panel { max-width: 190px; }
  .dice-container { right: 15px; }
  .angle-control { right: 15px; }
}
@media (max-width: 768px) {
  .angle-control {
    right: 10px;
    top: auto;
    bottom: 80px;
    flex-direction: row;
    padding: 8px;
  }
  .angle-control-title { display: none; }
  .angle-btn { width: 38px; height: 38px; font-size: 12px; }
}

// ==================== GAME STATE ====================
let gameState = { mapType:'world', players:[], currentPlayer:0, board:[], gameOver:false, winner:null, usedQuestions:new Set() };
let selectedMap = 'world', selectedCount = 2, selectedChars = [], charNames = {};
let isRolling = false, currentQuiz = null, waitingForQuizClose = false;
const WIN_SCORE = 10, SKIP_THRESHOLD = 3;

// ==================== START SCREEN ====================
function selectMap(map) {
  selectedMap = map;
  document.querySelectorAll('.map-card').forEach(c => c.classList.remove('selected'));
  document.querySelector(`[data-map="${map}"]`).classList.add('selected');
}
function selectCount(count) {
  selectedCount = count; selectedChars = []; charNames = {};
  document.querySelectorAll('.count-btn').forEach((b,i) => b.classList.toggle('selected', i === count-1));
  document.getElementById('selectedChars').textContent = '';
  document.querySelectorAll('.char-card').forEach(c => c.classList.remove('selected','assigned'));
}
function selectChar(emoji,name) {
  if (selectedChars.length >= selectedCount) { alert('已为所有玩家选择了角色！'); return; }
  const card = document.querySelector(`[data-char="${emoji}"]`);
  if (card.classList.contains('assigned')) return;
  selectedChars.push(emoji); charNames[selectedChars.length-1] = name;
  card.classList.add('assigned');
  document.getElementById('selectedChars').textContent = '已选择: ' + selectedChars.map((c,i) => `玩家${i+1}=${c}${charNames[i]}`).join(', ');
}

function startGame() {
  if (selectedChars.length < selectedCount) {
    const allChars = ['🧑‍🚀','👩‍🎨','👨‍🔬','🕵️','🧙','🦸','🧛','🤖'];
    const names = ['宇航员','艺术家','科学家','探险家','魔法师','超级英雄','吸血鬼','机器人'];
    for (let i = selectedChars.length; i < selectedCount; i++) {
      for (let j = 0; j < allChars.length; j++) {
        if (!selectedChars.includes(allChars[j])) { selectedChars.push(allChars[j]); charNames[i] = names[j]; break; }
      }
    }
  }
  initGame();
  document.getElementById('startScreen').classList.add('hidden');
  const gs = document.getElementById('gameScreen');
  gs.classList.remove('hidden');
  setTimeout(() => gs.style.opacity = '1', 50);
  document.body.classList.toggle('theme-china', selectedMap === 'china');
}

function initGame() {
  const mapData = selectedMap === 'world' ? WORLD_MAP : CHINA_MAP;
  gameState = { mapType: selectedMap, players: [], currentPlayer: 0, board: JSON.parse(JSON.stringify(mapData)), gameOver: false, winner: null, usedQuestions: new Set() };
  const colors = ['#ff4757','#2ed573','#1e90ff','#ffa502'];
  const colorNames = ['p1','p2','p3','p4'];
  for (let i = 0; i < selectedCount; i++) {
    gameState.players.push({ id:i, name:`玩家 ${i+1}`, char:selectedChars[i]||['🧑‍🚀','👩‍🎨','👨‍🔬','🕵️'][i], charName:charNames[i]||['宇航员','艺术家','科学家','探险家'][i], position:0, correct:0, wrong:0, skipTurns:0, color:colors[i], colorClass:colorNames[i] });
  }
  renderBoard(); renderPlayers(); updateUI(); addLog('🎮 游戏开始！' + (selectedMap==='world'?'世界之旅':'中华之旅'));
}

// ==================== BOARD RENDERING - FIXED LAYOUT ====================
function renderBoard() {
  const ring = document.getElementById('boardRing');
  ring.innerHTML = '';
  const cells = gameState.board;

  if (selectedMap === 'world') {
    // World map: circular ring layout (rotated 180°)
    const count = cells.length;
    const radius = 350;
    const centerX = 400;
    const centerY = 400;

    cells.forEach((cell, i) => {
      // 180° rotated: + Math.PI / 2 instead of - Math.PI / 2
      const angle = (i / count) * Math.PI * 2 + Math.PI / 2;
      const x = centerX + radius * Math.cos(angle) - 42.5;
      const y = centerY + radius * Math.sin(angle) - 42.5;

      const cellEl = document.createElement('div');
      cellEl.className = `cell ${cell.type}`;
      cellEl.id = `cell-${i}`;
      cellEl.style.left = `${x}px`;
      cellEl.style.top = `${y}px`;

      cellEl.innerHTML = `
        <div class="cell-face cell-front">
          <div class="cell-icon">${cell.icon}</div>
          <div class="cell-name">${cell.name}</div>
        </div>
        <div class="cell-face cell-back"></div>
        <div class="cell-face cell-top"></div>
        <div class="cell-face cell-right"></div>
        <div class="cell-face cell-left"></div>
        <div class="cell-face cell-bottom"></div>
      `;

      ring.appendChild(cellEl);
    });
  } else {
    // China map: geographic position layout (rotated 180° via center symmetry)
    const mapW = 800, mapH = 800;
    const padding = 60;
    const availW = mapW - padding * 2;
    const availH = mapH - padding * 2;

    // China outline shape (simplified rooster shape as SVG background) - rotated 180°
    const chinaOutline = document.createElement('div');
    chinaOutline.style.cssText = `position:absolute;left:${padding}px;top:${padding}px;width:${availW}px;height:${availH}px;opacity:0.15;pointer-events:none;z-index:1;`;
    chinaOutline.innerHTML = `<svg viewBox="0 0 100 100" width="100%" height="100%"><path d="M75,8 L82,5 L88,8 L92,15 L90,22 L85,28 L88,35 L85,42 L80,45 L82,52 L78,58 L72,55 L68,60 L65,68 L60,72 L55,78 L50,82 L45,85 L40,88 L35,85 L30,80 L25,75 L20,70 L18,62 L15,55 L12,48 L10,40 L8,32 L10,25 L15,20 L20,18 L25,15 L30,12 L35,10 L40,8 L45,6 L50,5 L55,6 L60,5 L65,6 L70,7 Z" fill="rgba(255,215,0,.3)" stroke="rgba(255,215,0,.5)" stroke-width="0.5"/></svg>`;
    ring.appendChild(chinaOutline);

    cells.forEach((cell, i) => {
      // 使用原始地理坐标，正向显示
      const x = padding + cell.x * availW - 42.5;
      const y = padding + cell.y * availH - 42.5;

      const cellEl = document.createElement('div');
      cellEl.className = `cell ${cell.type}`;
      cellEl.id = `cell-${i}`;
      cellEl.style.left = `${x}px`;
      cellEl.style.top = `${y}px`;
      cellEl.style.zIndex = '10';

      cellEl.innerHTML = `
        <div class="cell-face cell-front">
          <div class="cell-icon">${cell.icon}</div>
          <div class="cell-name">${cell.name}</div>
        </div>
        <div class="cell-face cell-back"></div>
        <div class="cell-face cell-top"></div>
        <div class="cell-face cell-right"></div>
        <div class="cell-face cell-left"></div>
        <div class="cell-face cell-bottom"></div>
      `;

      ring.appendChild(cellEl);
    });

    // Draw connection lines between adjacent cells in path order (rotated 180°)
    const svgLines = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    svgLines.style.cssText = `position:absolute;left:0;top:0;width:100%;height:100%;pointer-events:none;z-index:5;`;
    let pathD = '';
    cells.forEach((cell, i) => {
      const next = cells[(i + 1) % cells.length];
      // 使用原始地理坐标绘制连线
      const x1 = padding + cell.x * availW;
      const y1 = padding + cell.y * availH;
      const x2 = padding + next.x * availW;
      const y2 = padding + next.y * availH;
      if (i === 0) pathD += `M${x1},${y1}`;
      pathD += ` L${x2},${y2}`;
    });
    svgLines.innerHTML = `<path d="${pathD}" fill="none" stroke="rgba(255,215,0,.25)" stroke-width="3" stroke-dasharray="8,4"/>`;
    ring.appendChild(svgLines);
  }

  document.getElementById('centerTitle').textContent = selectedMap === 'world' ? '🌍' : '🏯';
}

function renderPlayers() {
  document.querySelectorAll('.player-token').forEach(t => t.remove());
  gameState.players.forEach((player, i) => {
    const token = document.createElement('div');
    token.className = `player-token ${player.colorClass}`;
    token.id = `player-${i}`;
    token.textContent = player.char;
    token.style.borderColor = '#fff';
    document.getElementById('boardRing').appendChild(token);
    updatePlayerPosition(i);
  });
}

function updatePlayerPosition(playerIndex) {
  const player = gameState.players[playerIndex];
  const cells = gameState.board;
  const cell = cells[player.position];

  let x, y;

  if (selectedMap === 'world') {
    const count = cells.length;
    const radius = 350;
    const centerX = 400;
    const centerY = 400;
    // 180° rotated: + Math.PI / 2 instead of - Math.PI / 2
    const angle = (player.position / count) * Math.PI * 2 + Math.PI / 2;

    const sameCell = gameState.players.filter((p, idx) => idx !== playerIndex && p.position === player.position);
    let offsetX = 0, offsetY = 0;
    if (sameCell.length > 0) {
      const idx = sameCell.length;
      offsetX = (idx % 2 === 0 ? 18 : -18) * (Math.floor(idx / 2) + 1);
      offsetY = (idx % 2 === 0 ? -18 : 18) * (Math.floor(idx / 2) + 1);
    }

    x = centerX + radius * Math.cos(angle) - 22 + offsetX;
    y = centerY + radius * Math.sin(angle) - 22 + offsetY;
  } else {
    // China map: use geographic x,y rotated 180°
    const mapW = 800, mapH = 800;
    const padding = 60;
    const availW = mapW - padding * 2;
    const availH = mapH - padding * 2;

    const sameCell = gameState.players.filter((p, idx) => idx !== playerIndex && p.position === player.position);
    let offsetX = 0, offsetY = 0;
    if (sameCell.length > 0) {
      const idx = sameCell.length;
      offsetX = (idx % 2 === 0 ? 20 : -20) * (Math.floor(idx / 2) + 1);
      offsetY = (idx % 2 === 0 ? -20 : 20) * (Math.floor(idx / 2) + 1);
    }

    // 使用原始地理坐标，正向显示
    x = padding + cell.x * availW - 22 + offsetX;
    y = padding + cell.y * availH - 22 + offsetY;
  }

  const token = document.getElementById(`player-${playerIndex}`);
  if (token) {
    token.style.left = `${x}px`;
    token.style.top = `${y}px`;
  }
}

function updateUI() {
  const panel = document.getElementById('playerPanel');
  panel.innerHTML = '';
  gameState.players.forEach((player, i) => {
    const card = document.createElement('div');
    card.className = `player-card ${i===gameState.currentPlayer?'active':''} ${player.skipTurns>0?'skip-turn':''}`;
    const progress = Math.min((player.correct / WIN_SCORE) * 100, 100);
    card.innerHTML = `
      <div class="player-header">
        <div class="player-avatar" style="background:${player.color}">${player.char}</div>
        <div class="player-info">
          <h4>${player.name} (${player.charName})</h4>
          <div class="player-stats">
            <span class="stat-correct">✓ ${player.correct}</span>
            <span class="stat-wrong">✗ ${player.wrong}</span>
          </div>
        </div>
      </div>
      <div style="font-size:11px;opacity:.7;">目标: ${WIN_SCORE}题</div>
      <div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>
      ${player.skipTurns>0?`<div style="font-size:10px;color:#ff4757;margin-top:4px;">⏸️ 暂停 ${player.skipTurns} 回合</div>`:''}
    `;
    panel.appendChild(card);
  });

  const current = gameState.players[gameState.currentPlayer];
  document.getElementById('turnText').textContent = `${current.name} (${current.charName}) 的回合`;
  document.getElementById('turnDot').style.background = current.color;
  document.querySelectorAll('.player-token').forEach((t, i) => t.classList.toggle('active', i === gameState.currentPlayer));

  const rollBtn = document.getElementById('rollBtn');
  const canRoll = !isRolling && !waitingForQuizClose && current.skipTurns === 0 && !gameState.gameOver;
  rollBtn.disabled = !canRoll;
  rollBtn.textContent = current.skipTurns > 0 ? '⏸️ 暂停中' : '🎲 投掷骰子';

  // Highlight current cell
  document.querySelectorAll('.cell').forEach((c, i) => c.classList.toggle('current-cell', i === current.position));
}

// ==================== DICE & MOVEMENT ====================
function rollDice() {
  if (isRolling || waitingForQuizClose) return;
  const current = gameState.players[gameState.currentPlayer];
  if (current.skipTurns > 0 || gameState.gameOver) return;

  isRolling = true; updateUI();
  const dice = document.getElementById('dice3d');
  dice.classList.add('rolling');
  const result = Math.floor(Math.random() * 6) + 1;

  setTimeout(() => {
    dice.classList.remove('rolling');
    setDiceRotation(result);
    setTimeout(() => { movePlayer(gameState.currentPlayer, result); isRolling = false; }, 400);
  }, 1100);
}

function setDiceRotation(value) {
  const dice = document.getElementById('dice3d');
  const r = { 1:'rotateX(0)rotateY(0)', 2:'rotateX(180deg)rotateY(0)', 3:'rotateX(0)rotateY(-90deg)', 4:'rotateX(0)rotateY(90deg)', 5:'rotateX(-90deg)rotateY(0)', 6:'rotateX(90deg)rotateY(0)' };
  dice.style.transform = r[value];
}

function movePlayer(playerIndex, steps) {
  const player = gameState.players[playerIndex];
  const oldPos = player.position;
  const boardLen = gameState.board.length;
  let currentStep = 0;

  const moveInterval = setInterval(() => {
    if (currentStep >= steps) {
      clearInterval(moveInterval);
      onLand(playerIndex);
      return;
    }
    player.position = (player.position + 1) % boardLen;
    updatePlayerPosition(playerIndex);
    currentStep++;
    // Visual feedback on cell
    const cell = document.getElementById(`cell-${player.position}`);
    if (cell) {
      cell.style.transform = 'translateZ(30px) scale(1.08)';
      setTimeout(() => { cell.style.transform = ''; }, 200);
    }
  }, 280);

  addLog(`${player.name} 掷出 ${steps} 点，从 ${gameState.board[oldPos].name} → ${gameState.board[(oldPos+steps)%boardLen].name}`);
}

function onLand(playerIndex) {
  const player = gameState.players[playerIndex];
  const cell = gameState.board[player.position];
  if (cell.type === 'chance') { handleChance(playerIndex); }
  else if (cell.type === 'start') { addLog(`${player.name} 经过起点，继续冒险！`); nextTurn(); }
  else { showQuiz(playerIndex, cell.name); }
}

// ==================== CHANCE ====================
function handleChance(playerIndex) {
  const event = CHANCE_EVENTS[Math.floor(Math.random() * CHANCE_EVENTS.length)];
  const player = gameState.players[playerIndex];
  addLog(`🎲 ${player.name} 触发机会：${event.text}`);

  switch(event.effect) {
    case 'free_correct':
      player.correct = Math.min(player.correct + 1, WIN_SCORE);
      addLog(`${player.name} 直接获得1分！(${player.correct}/${WIN_SCORE})`);
      checkWin(); if (!gameState.gameOver) nextTurn();
      break;
    case 'back':
      player.position = (player.position - event.steps + gameState.board.length) % gameState.board.length;
      updatePlayerPosition(playerIndex); addLog(`${player.name} 后退 ${event.steps} 格！`); nextTurn();
      break;
    case 'forward':
      player.position = (player.position + event.steps) % gameState.board.length;
      updatePlayerPosition(playerIndex); addLog(`${player.name} 前进 ${event.steps} 格！`); onLand(playerIndex);
      return;
    case 'bonus': showQuiz(playerIndex, gameState.board[player.position].name, true); return;
    case 'skip_turn': player.skipTurns = 1; addLog(`${player.name} 暂停一回合！`); nextTurn(); break;
    case 'easy': addLog(`${player.name} 获得简单模式（效果已记录）`); nextTurn(); break;
    case 'roll_again': addLog(`${player.name} 可以再掷一次！`); isRolling = false; updateUI(); return;
  }
}

// ==================== QUIZ - FIXED Z-INDEX & CLICK ====================
function showQuiz(playerIndex, location, isBonus = false) {
  const questions = gameState.mapType === 'world' ? WORLD_QUESTIONS : CHINA_QUESTIONS;
  const locQuestions = questions[location];
  if (!locQuestions || locQuestions.length === 0) { addLog(`⚠️ ${location} 题库为空`); nextTurn(); return; }

  let available = locQuestions.map((q, i) => i).filter(i => !gameState.usedQuestions.has(`${location}-${i}`));
  if (available.length === 0) { gameState.usedQuestions.clear(); available = locQuestions.map((q, i) => i); }

  const qIndex = available[Math.floor(Math.random() * available.length)];
  gameState.usedQuestions.add(`${location}-${qIndex}`);
  const question = locQuestions[qIndex];
  currentQuiz = { playerIndex, question, location, isBonus, answered: false };

  waitingForQuizClose = true; updateUI();

  document.getElementById('quizIcon').textContent = gameState.board[gameState.players[playerIndex].position].icon;
  document.getElementById('quizLocation').textContent = location;
  document.getElementById('quizCategory').textContent = gameState.mapType === 'world' ? '🌍 世界知识问答' : '🏯 中华知识问答';
  document.getElementById('quizQuestion').textContent = question.q;

  const optionsContainer = document.getElementById('quizOptions');
  optionsContainer.innerHTML = '';
  question.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `<div class="option-label">${String.fromCharCode(65 + i)}</div><div style="flex:1">${opt}</div>`;
    btn.onclick = function(e) { e.stopPropagation(); answerQuiz(i); };
    optionsContainer.appendChild(btn);
  });

  document.getElementById('explanation').classList.remove('show');
  document.getElementById('explanation').innerHTML = '';
  const actionBtn = document.getElementById('quizActionBtn');
  actionBtn.textContent = '请选择答案';
  actionBtn.disabled = true;
  actionBtn.onclick = function(e) { e.stopPropagation(); closeQuiz(); };

  document.getElementById('quizModal').classList.add('show');
}

function answerQuiz(answerIndex) {
  if (!currentQuiz || currentQuiz.answered) return;
  currentQuiz.answered = true;
  const { playerIndex, question } = currentQuiz;
  const player = gameState.players[playerIndex];
  const isCorrect = answerIndex === question.a;

  document.querySelectorAll('.option-btn').forEach((btn, i) => {
    btn.classList.add('disabled');
    btn.onclick = null;
    if (i === question.a) btn.classList.add('correct');
    else if (i === answerIndex && !isCorrect) btn.classList.add('wrong');
  });

  const expDiv = document.getElementById('explanation');
  expDiv.innerHTML = `<div style="font-weight:bold;margin-bottom:8px;color:${isCorrect?'#2ed573':'#ff4757'}">${isCorrect?'✅ 回答正确！':'❌ 回答错误！'}</div><div>${question.exp}</div>`;
  expDiv.classList.add('show');

  const actionBtn = document.getElementById('quizActionBtn');
  actionBtn.textContent = '继续';
  actionBtn.disabled = false;

  if (isCorrect) {
    player.correct++;
    addLog(`✅ ${player.name} 在 ${currentQuiz.location} 答对！(${player.correct}/${WIN_SCORE})`);
  } else {
    player.wrong++;
    addLog(`❌ ${player.name} 在 ${currentQuiz.location} 答错`);
    if (player.wrong % SKIP_THRESHOLD === 0 && player.wrong > 0) {
      player.skipTurns = 1;
      addLog(`⚠️ ${player.name} 累计答错 ${player.wrong} 题，暂停一回合！`);
    }
  }
  updateUI(); checkWin();
}

function closeQuiz() {
  if (!currentQuiz) return;
  document.getElementById('quizModal').classList.remove('show');
  waitingForQuizClose = false; currentQuiz = null;
  if (!gameState.gameOver) nextTurn();
}

// ==================== TURN & WIN ====================
function nextTurn() {
  if (gameState.gameOver) return;
  const current = gameState.players[gameState.currentPlayer];
  if (current.skipTurns > 0) { current.skipTurns--; addLog(`${current.name} 暂停结束`); }
  do { gameState.currentPlayer = (gameState.currentPlayer + 1) % gameState.players.length; }
  while (gameState.players[gameState.currentPlayer].skipTurns > 0 && !gameState.gameOver);
  updateUI();
}

function checkWin() {
  const winner = gameState.players.find(p => p.correct >= WIN_SCORE);
  if (winner && !gameState.gameOver) {
    gameState.gameOver = true; gameState.winner = winner;
    setTimeout(() => showGameOver(), 600);
  }
}

function showGameOver() {
  const winner = gameState.winner;
  document.getElementById('winnerName').textContent = `${winner.name} (${winner.charName})`;
  const statsDiv = document.getElementById('finalStats');
  statsDiv.innerHTML = '';
  gameState.players.forEach(p => {
    const stat = document.createElement('div');
    stat.className = 'final-stat';
    stat.innerHTML = `<div style="font-size:28px;margin-bottom:5px;">${p.char}</div><div class="final-stat-value">${p.correct}</div><div class="final-stat-label">${p.name}<br>✓${p.correct} ✗${p.wrong}</div>`;
    statsDiv.appendChild(stat);
  });
  document.getElementById('gameScreen').style.opacity = '0';
  setTimeout(() => {
    document.getElementById('gameScreen').classList.add('hidden');
    document.getElementById('gameOverScreen').classList.remove('hidden');
  }, 500);
  createConfetti();
  addLog(`🏆 游戏结束！${winner.name} 获胜！`);
}

function createConfetti() {
  const colors = ['#ff4757','#2ed573','#1e90ff','#ffa502','#ffd700','#ff6b6b'];
  for (let i = 0; i < 80; i++) {
    const c = document.createElement('div');
    c.className = 'confetti';
    c.style.cssText = `left:${Math.random()*100}vw;background:${colors[Math.floor(Math.random()*colors.length)]};animation-duration:${Math.random()*3+2}s;border-radius:${Math.random()>.5?'50%':'0'};`;
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 5000);
  }
}

// ==================== SAVE / LOAD ====================
function saveGame() {
  const saveData = { gameState: {...gameState, usedQuestions: Array.from(gameState.usedQuestions)}, selectedMap, selectedCount, selectedChars, charNames, timestamp: new Date().toLocaleString('zh-CN') };
  localStorage.setItem('monopolyQuizSave_v2', JSON.stringify(saveData));
  addLog('💾 游戏已保存！'); alert('游戏已保存到本地存档！');
}
function loadGame() {
  const saveData = localStorage.getItem('monopolyQuizSave_v2');
  if (!saveData) { alert('没有找到存档！'); return; }
  try {
    const data = JSON.parse(saveData);
    selectedMap = data.selectedMap; selectedCount = data.selectedCount;
    selectedChars = data.selectedChars; charNames = data.charNames;
    gameState = {...data.gameState, usedQuestions: new Set(data.gameState.usedQuestions)};
    document.getElementById('startScreen').classList.add('hidden');
    const gs = document.getElementById('gameScreen');
    gs.classList.remove('hidden'); gs.style.opacity = '1';
    document.getElementById('gameOverScreen').classList.add('hidden');
    document.body.classList.toggle('theme-china', selectedMap === 'china');
    renderBoard(); renderPlayers(); updateUI(); addLog('📂 存档已读取！');
    if (gameState.gameOver) showGameOver();
  } catch(e) { alert('存档读取失败！'); console.error(e); }
}
function returnToMenu() {
  document.getElementById('gameScreen').classList.add('hidden');
  document.getElementById('gameScreen').style.opacity = '0';
  document.getElementById('gameOverScreen').classList.add('hidden');
  document.getElementById('startScreen').classList.remove('hidden');
  document.body.classList.remove('theme-china');
  selectedChars = []; charNames = {};
  document.getElementById('selectedChars').textContent = '';
  document.querySelectorAll('.char-card').forEach(c => c.classList.remove('selected','assigned'));
}

// ==================== LOG ====================
function addLog(message) {
  const log = document.getElementById('gameLog');
  const entry = document.createElement('div');
  entry.className = 'log-entry';
  entry.textContent = `[${new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit',second:'2-digit'})}] ${message}`;
  log.appendChild(entry);
  log.scrollTop = log.scrollHeight;
}

// ==================== KEYBOARD ====================
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space' && !waitingForQuizClose && !document.getElementById('gameScreen').classList.contains('hidden')) {
    e.preventDefault(); rollDice();
  }
  if (e.code === 'Escape') {
    if (document.getElementById('quizModal').classList.contains('show') && currentQuiz && currentQuiz.answered) {
      closeQuiz();
    }
  }
});

// ==================== 3D ROTATION (SPHERICAL) ====================
let isDragging = false;
let startMouseX = 0, startMouseY = 0;
let rotX = 18, rotY = 0; // 当前旋转角度（X: 俯仰, Y: 水平）
let startRotX = 18, startRotY = 0;
let isFixedAngle = false;
let fixedAngleValue = 0;

function applyWorldTransform() {
  const world = document.getElementById('world3d');
  if (!world) return;
  const targetY = isFixedAngle ? fixedAngleValue : rotY;
  const targetX = isFixedAngle ? 18 : rotX;
  world.style.transform = `rotateX(${targetX}deg) rotateY(${targetY}deg) rotateZ(2deg)`;
}

function setTransition(enabled) {
  const world = document.getElementById('world3d');
  if (!world) return;
  world.style.transition = enabled ? 'transform 1.2s ease' : 'none';
}

function isSceneTarget(e) {
  return e.target.closest('.world-3d') || e.target.closest('.scene-3d') || e.target.closest('.cell') || e.target.closest('.board-ring') || e.target.closest('.center-hub') || e.target.closest('.player-token');
}

// Mouse drag
document.addEventListener('mousedown', (e) => { 
  if (e.target.closest('.angle-control') || e.target.closest('.modal-overlay') || e.target.closest('.quiz-modal') || e.target.closest('.dice-container') || e.target.closest('.player-panel') || e.target.closest('.turn-indicator') || e.target.closest('.game-log') || e.target.closest('.save-panel')) return;
  if (isSceneTarget(e)) { 
    isDragging = true; 
    startMouseX = e.clientX;
    startMouseY = e.clientY;
    startRotX = rotX;
    startRotY = rotY;
    if (isFixedAngle) {
      isFixedAngle = false;
      updateAngleButtons();
    }
    setTransition(false);
  } 
});

document.addEventListener('mousemove', (e) => {
  if (!isDragging) return;
  const deltaX = e.clientX - startMouseX;
  const deltaY = e.clientY - startMouseY;
  rotY = startRotY + deltaX * 0.5;
  rotX = startRotX - deltaY * 0.5;
  // 限制X轴，避免完全翻转导致视角混乱
  if (rotX > 85) rotX = 85;
  if (rotX < -85) rotX = -85;
  applyWorldTransform();
});

document.addEventListener('mouseup', () => { 
  if (isDragging) {
    isDragging = false; 
    setTransition(true);
  }
});

// Touch drag
document.addEventListener('touchstart', (e) => { 
  if (e.target.closest('.angle-control') || e.target.closest('.modal-overlay') || e.target.closest('.quiz-modal') || e.target.closest('.dice-container') || e.target.closest('.player-panel') || e.target.closest('.turn-indicator') || e.target.closest('.game-log') || e.target.closest('.save-panel')) return;
  if (isSceneTarget(e)) { 
    isDragging = true; 
    startMouseX = e.touches[0].clientX;
    startMouseY = e.touches[0].clientY;
    startRotX = rotX;
    startRotY = rotY;
    if (isFixedAngle) {
      isFixedAngle = false;
      updateAngleButtons();
    }
    setTransition(false);
  } 
}, {passive: false});

document.addEventListener('touchmove', (e) => {
  if (!isDragging) return;
  e.preventDefault();
  const deltaX = e.touches[0].clientX - startMouseX;
  const deltaY = e.touches[0].clientY - startMouseY;
  rotY = startRotY + deltaX * 0.5;
  rotX = startRotX - deltaY * 0.5;
  if (rotX > 85) rotX = 85;
  if (rotX < -85) rotX = -85;
  applyWorldTransform();
}, {passive: false});

document.addEventListener('touchend', () => { 
  if (isDragging) {
    isDragging = false; 
    setTransition(true);
  }
});

// Auto gentle rotation (like a globe)
setInterval(() => {
  if (!isDragging && !isFixedAngle && !document.getElementById('gameScreen').classList.contains('hidden')) {
    rotY = (rotY + 0.03) % 360;
    applyWorldTransform();
  }
}, 50);

function setFixedAngle(angle) {
  const world = document.getElementById('world3d');
  if (!world) return;
  
  if (angle === -1) {
    isFixedAngle = false;
    updateAngleButtons();
  } else {
    isFixedAngle = true;
    fixedAngleValue = angle;
    rotX = 18;
    rotY = angle;
    world.style.transition = 'transform 0.6s cubic-bezier(.34,1.56,.64,1)';
    applyWorldTransform();
    setTimeout(() => {
      if (world) world.style.transition = 'transform 1.2s ease';
    }, 600);
  }
  updateAngleButtons();
}

function updateAngleButtons() {
  const angles = [0, 90, 180, 270, -1];
  document.querySelectorAll('.angle-btn').forEach((btn, i) => {
    const isActive = isFixedAngle ? fixedAngleValue === angles[i] : angles[i] === -1;
    btn.classList.toggle('active', isActive);
  });
}

// ==================== INIT ====================
window.addEventListener('load', () => { selectMap('world'); selectCount(2); });

</script>
